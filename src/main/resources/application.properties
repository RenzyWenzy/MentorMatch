spring.application.name=MentorMatch
server.port=8080

# ===== PostgreSQL Database =====
# Update these to match your local PostgreSQL setup.
# Create the database first, e.g.: CREATE DATABASE mentormatch;
spring.datasource.url=jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:6543/postgres
spring.datasource.username=postgres.caddqyfgcuwkquqofblh
spring.datasource.password=QIedBctmXL2so36i
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.jpa.properties.hibernate.query.plan_cache_max_size=32

# ===== JPA / Hibernate =====
# 'update' auto-creates/updates tables from the entities during development.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===== JWT =====
# IMPORTANT: replace this secret before deploying anywhere real.
# Must be at least 256 bits (32+ characters) for HS256.
jwt.secret=change-this-to-a-long-random-secret-value-before-deploying-anywhere
jwt.expiration-ms=86400000
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.tool.schema=DEBUG
